<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The War Inside</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div class="hud">
    <div class="hud-left">The War Inside</div>
    <div class="hud-center">Stage 0: Loading</div>
    <div class="hud-right">Progress 0%</div>
  </div>

  <div class="background-effects">
    <span class="particle p1"></span>
    <span class="particle p2"></span>
    <span class="particle p3"></span>
    <span class="particle p4"></span>
    <span class="particle p5"></span>
    <span class="particle p6"></span>
    <span class="particle p7"></span>
    <span class="particle p8"></span>
  </div>

  <section class="hero">
    <p class="overline">IMMUNE DEFENSE SIMULATION</p>
    <h1>The War Inside</h1>
    <p class="hero-subtext">
      Enter the hidden battlefield inside the human body and explore how immune cells detect,
      respond to, and remember biological threats.
    </p>
    <button id="startBtn">Begin the Battle</button>
  </section>

  <script src="script.js?v=4"></script>
</body>
</html>
